<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 60" width="360" height="60">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B6914;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#F0C96B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B08D3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0C96B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="360" height="60" fill="#000000"/>

  <!-- Icon left -->
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="40" height="40" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <rect x="5" y="5" width="30" height="30" fill="none" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.5"/>
    <line x1="0" y1="0" x2="40" y2="40" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.35"/>
    <line x1="40" y1="0" x2="0" y2="40" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.35"/>
    <polygon points="20,6 34,20 20,34 6,20" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
    <circle cx="20" cy="20" r="2.5" fill="url(#goldGrad2)"/>
    <circle cx="5"  cy="5"  r="1.2" fill="url(#goldGrad2)" opacity="0.6"/>
    <circle cx="35" cy="5"  r="1.2" fill="url(#goldGrad2)" opacity="0.6"/>
    <circle cx="5"  cy="35" r="1.2" fill="url(#goldGrad2)" opacity="0.6"/>
    <circle cx="35" cy="35" r="1.2" fill="url(#goldGrad2)" opacity="0.6"/>
  </g>

  <!-- Brand name -->
  <text x="62" y="26"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="400"
    letter-spacing="5"
    fill="url(#goldGrad)"
    dominant-baseline="middle">CEILEMENT</text>

  <!-- Tagline -->
  <text x="63" y="44"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="7"
    font-weight="400"
    letter-spacing="3.5"
    fill="#b08d3a"
    opacity="0.7"
    dominant-baseline="middle">ARCHITECTURAL CEILING DESIGN</text>

  <!-- Rule -->
  <line x1="62" y1="52" x2="345" y2="52" stroke="url(#goldGrad)" stroke-width="0.4" opacity="0.35"/>
</svg>

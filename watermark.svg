<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Transparent background - watermark overlays on any image -->

  <!-- Outer frame -->
  <rect x="10" y="10" width="280" height="280" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Inner frame -->
  <rect x="30" y="30" width="240" height="240" fill="none" stroke="white" stroke-width="0.8" opacity="0.35"/>

  <!-- Diagonal lines -->
  <line x1="10" y1="10" x2="290" y2="290" stroke="white" stroke-width="0.6" opacity="0.2"/>
  <line x1="290" y1="10" x2="10" y2="290" stroke="white" stroke-width="0.6" opacity="0.2"/>

  <!-- Diamond -->
  <polygon points="150,40 260,150 150,260 40,150" fill="none" stroke="white" stroke-width="1.2" opacity="0.5"/>

  <!-- Corner ornaments -->
  <circle cx="10" cy="10" r="3" fill="white" opacity="0.5"/>
  <circle cx="290" cy="10" r="3" fill="white" opacity="0.5"/>
  <circle cx="10" cy="290" r="3" fill="white" opacity="0.5"/>
  <circle cx="290" cy="290" r="3" fill="white" opacity="0.5"/>

  <!-- Mid-point marks -->
  <circle cx="150" cy="10" r="2" fill="white" opacity="0.35"/>
  <circle cx="150" cy="290" r="2" fill="white" opacity="0.35"/>
  <circle cx="10" cy="150" r="2" fill="white" opacity="0.35"/>
  <circle cx="290" cy="150" r="2" fill="white" opacity="0.35"/>

  <!-- Center dot -->
  <circle cx="150" cy="150" r="5" fill="white" opacity="0.5"/>
  <circle cx="150" cy="150" r="10" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- Brand name centered -->
  <text x="150" y="155"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="400"
    letter-spacing="5"
    fill="white"
    opacity="0.55"
    text-anchor="middle"
    dominant-baseline="middle">CEILEMENT</text>

  <!-- Tagline -->
  <text x="150" y="180"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="7.5"
    letter-spacing="3.5"
    fill="white"
    opacity="0.4"
    text-anchor="middle"
    dominant-baseline="middle">ARCHITECTURAL CEILING DESIGN</text>
</svg>

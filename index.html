<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ceilement -ceiling configurater </title>
    <script src="data.js"></script>
    <style>
        :root { --gold: #b08d67; --dark: #000; --cream: #fdf5e6; --wa-green: #25D366; }
        body, html { 
            margin: 0; padding: 0; background: #000; color: white; 
            font-family: sans-serif; 
            height: 100vh; height: 100svh; /* פתרון לבעיית הלחצנים בנייד */
            overflow: hidden; 
        }
        
        #app-container { display: flex; flex-direction: column; height: 100%; }

        .header { height: 60px; display: flex; justify-content: center; align-items: center; background: #000; padding: 5px 15px; border-bottom: 1px solid #222; flex-shrink: 0; position: relative; }
        .header img { max-width: 80%; max-height: 100%; object-fit: contain; }

        .info-btn { 
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            width: 28px; height: 28px; border: 1px solid var(--gold); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: var(--gold); font-weight: bold; cursor: pointer;
        }

        .preview-section { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        .layer-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .layer { position: absolute; height: 100%; width: auto; aspect-ratio: 1080 / 1350; object-fit: contain; transition: opacity 0.3s ease; }
        .watermark { position: absolute; z-index: 100; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.1; pointer-events: none; width: 50%; }

        #price-tag { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 30px;
            color: var(--gold); font-size: 20px; font-weight: bold; z-index: 60; border: 1px solid var(--gold);
        }

        .controls-section { background: #1a1a1a; border-top: 1px solid var(--gold); flex-shrink: 0; }
        .tabs { display: flex; background: #111; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #777; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .options-scroller { display: flex; overflow-x: auto; padding: 10px; gap: 10px; height: 120px; align-items: center; box-sizing: border-box; }
        .option-card { min-width: 85px; height: 100px; text-align: center; padding: 5px; border-radius: 10px; border: 2px solid transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card-cream { background: var(--cream); color: #333; }
        .card-dark { background: #222; color: #fff; }
        .option-card img { width: 50px; height: 50px; object-fit: contain; }
        .card-dark img { width: 70px; height: 70px; }
        .option-card.selected { border-color: var(--gold); }
        .option-card span { font-size: 10px; display: block; margin-top: 4px; font-weight: 800; }

        /* אזור הכפתורים עם מרווח ביטחון לתחתית המסך */
        .action-bar { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); /* מרווח ביטחון */
            background: #000; flex-shrink: 0; 
        }
        .btn { padding: 14px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; }
        .btn-save { background: var(--gold); color: black; }
        .btn-sec { background: #333; color: white; }
        .btn-lead { background: var(--wa-green); color: white; display: none; grid-column: span 2; font-size: 18px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: white; color: black; padding: 20px; border-radius: 15px; max-width: 400px; margin: 5% auto; position: relative; }
        .close-modal { position: absolute; left: 15px; top: 15px; font-size: 20px; cursor: pointer; color: #999; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .remove-btn { position: absolute; top: -8px; right: -8px; background: #ff4444; color: white; border: 2px solid white; border-radius: 50%; width: 24px; height: 24px; font-weight: bold; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <div class="info-btn" onclick="toggleInfo()">i</div>
        <img src="logo.png" alt="Logo">
    </div>

    <div class="preview-section">
        <div class="layer-container">
            <img src="background_design.png" class="layer" style="z-index:1">
            <img id="img-base" class="layer" style="z-index:2; opacity:0">
            <img id="img-mashrabiya" class="layer" style="z-index:3; opacity:0">
            <img id="img-profile" class="layer" style="z-index:4; opacity:0">
            
        </div>
        <div id="price-tag">0 ₪</div>
    </div>

    <div class="controls-section">
        <div class="tabs">
            <button class="tab-btn active" id="tab-base" onclick="showTab('base')">בסיס</button>
            <button class="tab-btn" id="tab-mash" onclick="showTab('mashrabiya')">משרביה</button>
            <button class="tab-btn" id="tab-light" onclick="showTab('profile')">תאורה</button>
        </div>
        <div id="options-container" class="options-scroller"></div>
        <div class="action-bar">
            <button class="btn btn-save" id="save-btn" onclick="saveForComparison()">שמור להשוואה</button>
            <button class="btn btn-sec" id="comp-btn" onclick="toggleComparison()">השוואות (<span id="comp-count">0</span>)</button>
            <button class="btn btn-lead" id="final-lead-btn" onclick="openLeadForm()">השארת פרטים להזמנה</button>
        </div>
    </div>
</div>

<div id="info-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="toggleInfo()">&times;</span>
        <h3>ברוכים הבאים לסילמנט</h3>
        <div style="line-height: 1.6; font-size: 14px; text-align: right;">
            <p><b>תקרות מוכנות מבית אלימנט</b></p>
            <p>עיצוב תקרה צפה (1.22*2.44) בהתאמה אישית.</p>
            <ul>
                <li>המחיר כולל תאורה, הובלה והתקנה.</li>
                <li>התקנה נקייה (כ-30 דק') ללא לכלוך.</li>
                <li>אין צורך בצבע או שפכטל.</li>
            </ul>
        </div>
    </div>
</div>

<div id="lead-modal" class="modal">
    <div class="modal-content">
        <h3>פרטי התקשרות</h3>
        <p id="order-desc" style="font-size: 13px; color: #666;"></p>
        <input type="text" id="cust-name" placeholder="שם מלא">
        <input type="tel" id="cust-phone" placeholder="מספר טלפון">
        <textarea id="cust-notes" placeholder="הערות נוספות..."></textarea>
        <button class="btn btn-save" style="width:100%; margin-top:10px;" onclick="submitOrder()">שלח בוואטסאפ</button>
        <button onclick="closeLeadForm()" style="width:100%; background:none; border:none; color:red; margin-top:10px;">ביטול</button>
    </div>
</div>

<div id="comparison-modal" class="modal">
    <div style="display:flex; justify-content: space-between; align-items: center; color:white;">
        <h2 style="margin:0;">ההשוואות שלי</h2>
        <button onclick="toggleComparison()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">חזור</button>
    </div>
    <div id="comparison-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px;"></div>
</div>

<script>
    let currentChoices = { base: null, mashrabiya: null, profile: null };
    let savedComparisons = JSON.parse(sessionStorage.getItem('myExhibitions') || '[]');
    const WHATSAPP_NUM = "972583231599";
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbx_7JV2CBJVO8ykMNAIEzlTucfJaRX7ySAsr-Up1Vf_4oFb8lY9foRZcdz070311L_a/exec";

    function toggleInfo() {
        const m = document.getElementById('info-modal');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function showTab(cat) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(cat === 'base' ? 'tab-base' : (cat === 'mashrabiya' ? 'tab-mash' : 'tab-light')).classList.add('active');
        const container = document.getElementById('options-container');
        container.style.background = (cat === 'base') ? '#1a1a1a' : '#000';
        container.innerHTML = '';
        const cardClass = (cat !== 'base') ? 'card-dark' : 'card-cream';

        if (typeof myProducts !== 'undefined') {
            myProducts.filter(p => p.category === cat).forEach(p => {
                const card = document.createElement('div');
                card.className = `option-card ${cardClass} ${currentChoices[cat]?.name === p.name ? 'selected' : ''}`;
                card.onclick = () => {
                    currentChoices[cat] = p;
                    updateLayer(cat, p.image);
                    updatePrice();
                    showTab(cat);
                };
                card.innerHTML = `<img src="${p.image}"><span>${p.name}</span>`;
                container.appendChild(card);
            });
        }
    }

    function updateLayer(cat, src) {
        const id = (cat === 'profile') ? 'img-profile' : (cat === 'mashrabiya' ? 'img-mashrabiya' : 'img-base');
        const img = document.getElementById(id);
        img.src = src; img.style.opacity = "1";
    }

    function updatePrice() {
        const total = Object.values(currentChoices).reduce((sum, i) => sum + (i?.price || 0), 0);
        document.getElementById('price-tag').innerText = total.toLocaleString() + " ₪";
    }

    function saveForComparison() {
        if(!currentChoices.base) return alert("נא לבחור בסיס קודם");
        savedComparisons.push({...currentChoices, id: Date.now(), totalPrice: document.getElementById('price-tag').innerText});
        sessionStorage.setItem('myExhibitions', JSON.stringify(savedComparisons));
        updateCompCount();
        alert("נשמר להשוואה!");
    }

    function updateCompCount() {
        document.getElementById('comp-count').innerText = savedComparisons.length;
    }

    function toggleComparison() {
        const modal = document.getElementById('comparison-modal');
        modal.style.display = (modal.style.display !== 'block') ? 'block' : 'none';
        if (modal.style.display === 'block') { renderComparisonGrid(); }
    }

    function renderComparisonGrid() {
        const grid = document.getElementById('comparison-grid');
        grid.innerHTML = '';
        savedComparisons.forEach(item => {
            const div = document.createElement('div');
            div.style = "position:relative;";
            div.innerHTML = `
                <div class="remove-btn" onclick="removeComp(${item.id})">×</div>
                <div style="background:var(--cream); padding:10px; border-radius:10px; text-align:center; color:#333;">
                    <div style="position:relative; height:100px; background:#000; border-radius:5px; overflow:hidden;">
                        <img src="${item.base.image}" style="position:absolute; width:100%; left:0; z-index:1;">
                        <img src="${item.mashrabiya?.image || ''}" style="position:absolute; width:100%; left:0; z-index:2; opacity:${item.mashrabiya?1:0}">
                        <img src="${item.profile?.image || ''}" style="position:absolute; width:100%; left:0; z-index:3; opacity:${item.profile?1:0}">
                    </div>
                    <p style="font-size:11px; margin:5px 0; font-weight:bold;">${item.totalPrice}</p>
                    <button class="btn btn-save" style="width:100%; padding:5px; font-size:12px;" onclick="selectFinal(${item.id})">בחר</button>
                </div>
            `;
            grid.appendChild(div);
        });
    }

    function removeComp(id) {
        savedComparisons = savedComparisons.filter(i => i.id !== id);
        sessionStorage.setItem('myExhibitions', JSON.stringify(savedComparisons));
        updateCompCount();
        renderComparisonGrid();
    }

    function selectFinal(id) {
        const s = savedComparisons.find(i => i.id === id);
        currentChoices = { ...s };
        if(s.base) updateLayer('base', s.base.image);
        if(s.mashrabiya) updateLayer('mashrabiya', s.mashrabiya.image);
        if(s.profile) updateLayer('profile', s.profile.image);
        updatePrice();
        document.getElementById('comparison-modal').style.display = 'none';
        document.getElementById('final-lead-btn').style.display = 'block';
        document.getElementById('save-btn').style.display = 'none';
        document.getElementById('comp-btn').style.display = 'none';
        showTab('base');
    }

    function openLeadForm() { document.getElementById('lead-modal').style.display = 'block'; }
    function closeLeadForm() { document.getElementById('lead-modal').style.display = 'none'; }

    async function submitOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const notes = document.getElementById('cust-notes').value;
        if(!name || !phone) return alert("נא למלא שם וטלפון");

        const data = {
            "תאריך": new Date().toLocaleString(),
            "שם": name, "טלפון": phone,
            "בסיס": currentChoices.base.name,
            "משרביה": currentChoices.mashrabiya?.name || "ללא",
            "תאורה": currentChoices.profile?.name || "ללא",
            "מחיר": document.getElementById('price-tag').innerText,
            "הערות": notes
        };

        fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        const msg = `הזמנה חדשה מסילמנט:\nשם: ${name}\nטלפון: ${phone}\nשילוב: ${data.בסיס} + ${data.משרביה}\nמחיר: ${data.מחיר}\nהערות: ${notes}`;
        window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`); 
        closeLeadForm();
    }

    window.onload = () => { updateCompCount(); showTab('base'); };
</script>
</body>
</html>
